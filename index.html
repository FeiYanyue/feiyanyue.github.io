<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>緋閻月 FeiYanyue | 調皮貓貓</title>
    <style>
        /* CSS 變數：定義火焰紅主題色 */
        :root {
            --bg-dark: #0a0202; 
            --primary-red: #ef4444; 
            --light-red: #fca5a5; 
            --neon-red: #ff1a1a; 
            --fire-orange: #f97316; 
            --text-main: #f8fafc;
            --text-muted: #cbd5e1;
            --card-bg: rgba(255, 255, 255, 0.03); 
        }

        /* 基礎設定與重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'PingFang TC', 'Heiti TC', 'Noto Sans TC', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 10% 10%, rgba(239, 68, 68, 0.15) 0%, transparent 45%),
                radial-gradient(circle at 90% 90%, rgba(249, 115, 22, 0.1) 0%, transparent 45%),
                radial-gradient(circle at 50% 50%, #1a0505 0%, var(--bg-dark) 70%);
            color: var(--text-main);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            padding: 3rem 1rem;
        }

        .container {
            max-width: 1200px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem; 
        }

        /* 👑 標題樣式 */
        .hero-title {
            text-align: center;
            animation: slideDownFade 1s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            opacity: 0;
            transform: translateY(-20px);
            z-index: 10;
        }

        .hero-title h1 {
            font-size: clamp(3rem, 7vw, 5.5rem); 
            font-weight: 900; 
            letter-spacing: 2px; 
            line-height: 1.1;
            margin-bottom: 0.5rem;
            
            background: linear-gradient(135deg, #fff 0%, var(--light-red) 40%, var(--primary-red) 50%, var(--fire-orange) 60%, #fff 100%);
            background-size: 200% auto;
            color: #fff; 
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shineText 5s linear infinite;

            text-shadow: 
                0 0 10px rgba(239, 68, 68, 0.6),
                0 0 20px rgba(239, 68, 68, 0.4),
                0 0 40px rgba(239, 68, 68, 0.2);
        }

        .hero-title p {
            font-size: clamp(1.2rem, 3vw, 1.8rem);
            color: var(--light-red);
            font-weight: 800;
            letter-spacing: clamp(4px, 1.5vw, 10px); 
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(239, 68, 68, 0.5);
            margin-top: 5px;
        }

        /* 📸 中間圖片區塊 */
        .image-showcase {
            position: relative;
            width: 100%;
            max-width: 550px; 
            aspect-ratio: 1 / 1; 
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 5;
            opacity: 1; 
            animation: floatOnly 6s ease-in-out infinite;
            pointer-events: none; 
            will-change: transform; 
        }

        .image-showcase::before {
            content: '';
            position: absolute;
            width: 70%;
            height: 70%;
            background: radial-gradient(circle, var(--neon-red) 0%, var(--fire-orange) 100%);
            filter: blur(80px);
            opacity: 0.35;
            border-radius: 50%;
            z-index: -1;
        }

        .character-img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 15px 30px rgba(0, 0, 0, 0.8));
        }

        /* 📝 玻璃擬態資訊卡片 */
        .info-card {
            background: var(--card-bg);
            -webkit-backdrop-filter: blur(20px);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 30px;
            padding: clamp(1.5rem, 5vw, 3rem); 
            width: 100%;
            max-width: 750px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
            
            animation: slideUpFade 1s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            opacity: 0;
            transform: translateY(20px);
            animation-delay: 0.3s;
            z-index: 10;
        }

        .info-card h2 {
            font-size: clamp(1.5rem, 4vw, 1.8rem);
            font-weight: 800;
            color: var(--light-red);
            margin-bottom: clamp(1.5rem, 4vw, 2rem);
            border-left: 4px solid var(--primary-red);
            padding-left: 1rem;
            line-height: 1;
        }

        /* 🔄 自我介紹欄位 */
        .info-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }

        .info-list li {
            display: flex;
            align-items: center;
            font-size: clamp(1.05rem, 2.5vw, 1.2rem);
            padding: 1rem 1.5rem;
            border-radius: 15px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid transparent;
            transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .info-list li:hover {
            background: rgba(239, 68, 68, 0.08); 
            border-color: rgba(239, 68, 68, 0.2); 
            transform: translateX(8px) scale(1.01);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
        }

        .info-list li::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 0;
            background: linear-gradient(to bottom, var(--fire-orange), var(--primary-red));
            transition: width 0.3s ease;
            box-shadow: 0 0 15px var(--primary-red);
        }

        @media (hover: hover) {
            .info-list li:hover::before { width: 4px; }
            .info-list li:hover strong {
                color: #fff;
                text-shadow: 0 0 5px var(--light-red);
            }
        }

        .info-list strong {
            color: var(--light-red);
            width: 140px;
            flex-shrink: 0;
            font-weight: 700;
            transition: color 0.3s ease;
        }

        /* 🚀 社群按鈕區塊 - 改用 Grid 完美對齊 */
        .social-links {
            margin-top: clamp(1.5rem, 4vw, 2.5rem);
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* 預設為 3 欄等寬 */
            gap: 1rem;
            width: 100%;
        }

        .social-btn {
            text-decoration: none;
            color: var(--text-main);
            padding: 1rem 1rem;
            border-radius: 50px;
            font-weight: 700;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            position: relative;
            overflow: hidden;
            width: 100%; /* 填滿 Grid 欄位 */
            font-size: 0.95rem;
        }

        .social-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, var(--primary-red), var(--fire-orange));
            opacity: 0;
            z-index: -1;
            transition: opacity 0.4s ease;
        }

        @media (hover: hover) {
            .social-btn:hover {
                transform: translateY(-4px);
                box-shadow: 0 12px 25px rgba(239, 68, 68, 0.4);
                border-color: transparent;
            }
            .social-btn:hover::before {
                opacity: 1;
            }
        }

        /* RWD 調整 */
        @media (max-width: 900px) {
            .social-links {
                grid-template-columns: repeat(2, 1fr); /* 平板尺寸改為 2 欄 */
            }
        }

        @media (max-width: 768px) {
            body { padding: 2rem 1rem; }
            .info-list li { 
                flex-direction: column; 
                align-items: flex-start; 
                gap: 0.5rem; 
                padding: 1.2rem; 
            }
            .info-list strong { 
                width: 100%; 
                border-bottom: 1px solid rgba(255,255,255,0.1); 
                padding-bottom: 0.3rem;
            }
            .social-links { gap: 0.8rem; }
            .social-btn { padding: 0.8rem 1rem; }
        }

        @media (max-width: 480px) {
            .social-links {
                grid-template-columns: 1fr; /* 小螢幕手機改為 1 欄直排 */
            }
        }

        /* 動畫 */
        @keyframes slideDownFade {
            0% { opacity: 0; transform: translateY(-30px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideUpFade {
            0% { opacity: 0; transform: translateY(30px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        @keyframes shineText {
            to { background-position: 200% center; }
        }

        @keyframes floatOnly {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
    </style>
</head>
